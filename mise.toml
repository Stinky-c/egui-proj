[tools]
rust = {
    version = "1.94",
    targets = "x86_64-pc-windows-msvc,x86_64-unknown-linux-gnu,wasm32-unknown-unknown"
}
"cargo:trunk" = { version = "0.21.14" }
"cargo:dioxus-cli" = { version = "0.7.4" }

[tasks]
"web:dev" = "trunk serve --open"
"web:build" = "trunk build"
"web:release" = "trunk build --release"

"app:hot" = "dx serve --hotpatch --features hotreload"
"app:dev" = "cargo run"
"app:build" = "cargo build"
"app:release" = "cargo build --release"
